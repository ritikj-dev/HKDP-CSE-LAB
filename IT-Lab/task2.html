<!-- Task 2: Create a class routine table using HTML -->
<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2nd Sem Routine(2026)</title>
</head>

<body>
  <h2 style="text-align: center;">
    2nd Sem Routine (CSE) - 2026
  </h2>
  <table border="1" cellpadding="10" style="margin: auto;">
    <tr>
      <th>Day</th>
      <th>9AM - 10AM </th>
      <th>10AM - 11AM</th>
      <th>11AM - 12PM</th>
    </tr>
    <tr>
      <td>Mon</td>
      <td>Sub 1</td>
      <td>Sub 2</td>
      <td rowspan="2">X</td>
    </tr>
    <tr>
      <td>Tue</td>
      <td>Sub 1</td>
      <td>Sub 2</td>
    </tr>
    <tr>
      <td>Wed</td>
      <td>Sub 1</td>
      <td>Sub 2</td>
      <td>Sub 3</td>
    </tr>
    <tr>
      <td>Thu</td>
      <td>Sub 1</td>
      <td>Sub 2</td>
      <td>Sub 3</td>
    </tr>
    <tr>
      <td>Fri</td>
      <td colspan="2">IT Lab</td>
      <td>Sub 2</td>
    </tr>
    <tr>
      <td>Sat</td>
      <td>Sub 1</td>
      <td>Sub 2</td>
      <td>Sub 3</td>
    </tr>
  </table>
</body>

</html>
